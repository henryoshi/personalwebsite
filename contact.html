<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry Shields | Contact</title>
    <meta name="description" content="Get in touch with Henry Shields — firmware engineer and CE/CS student at Northeastern University.">
    <!-- Open Graph -->
    <meta property="og:title" content="Henry Shields | Contact">
    <meta property="og:description" content="Reach out to Henry Shields via email, LinkedIn, or GitHub.">
    <meta property="og:type" content="website">
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon/favicon-16x16.png">
    <link rel="manifest" href="assets/images/favicon/site.webmanifest">
    <link rel="stylesheet" href="styles.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Contact Me</h1>
                <p class="intro">I'd love to hear from you! Feel free to reach out.</p>
                
                <div class="contact-content">
                    <div class="contact-info">
                        <h2>Get In Touch</h2>
                        <p><strong>Email:</strong> shieldshenry28@gmail.com</p>
                        <p><strong>University Email:</strong> shields.h@northeastern.edu</p>
                        <p><strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/henryshields/" target="_blank">linkedin.com/in/henryshields</a></p>
                        <p><strong>GitHub:</strong> <a href="https://github.com/henryoshi" target="_blank">github.com/henryoshi</a></p>
                    </div>
                    
                    <div class="contact-form">
                        <h2>Send a Message</h2>
                        <form>
                            <div class="form-group">
                                <label for="name">Name</label>
                                <input type="text" id="name" name="name" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="message">Message</label>
                                <textarea id="message" name="message" rows="5" required></textarea>
                            </div>
                            
                            <button type="submit" class="btn">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="main.js"></script>
    <script src="animations.js"></script>
</body>
</html>
